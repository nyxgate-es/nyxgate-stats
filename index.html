<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estadísticas</title>

<style>

body{
    margin:0;
    background:transparent;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    padding:20px;
}

.card{
    text-align:center;
    min-width:120px;
}

.value{
    font-size:52px;
    font-weight:bold;
    color:#7ec8ff;
}

.label{
    margin-top:6px;
    font-size:18px;
    color:#cfd8e3;
}

</style>

</head>

<body>

<div class="container" id="stats">

<div class="card">
<div class="value">...</div>
<div class="label">Cargando</div>
</div>

</div>

<script>

async function loadStats(){

    try{

        const proxy =
            "https://corsproxy.io/?";

        const url =
            "https://app.lightbucket.co/astronomers/nyxgate";

        const response =
            await fetch(proxy + encodeURIComponent(url), {
            headers: {
            "x-requested-with": "XMLHttpRequest"
            }
        });

        const html =
            await response.text();

        function getValue(label){

            const regex =
                new RegExp(
                    "<li>\\s*([0-9,.]+)\\s*" + label,
                    "i"
                );

            const match =
                html.match(regex);

            return match ? match[1] : "--";
        }

        const targets =
            getValue("targets");

        const sessions =
            getValue("sessions");

        const images =
            getValue("images");

        const hours =
            getValue("hours");

        document.getElementById("stats").innerHTML = `

            <div class="card">
                <div class="value">${targets}</div>
                <div class="label">Objetos</div>
            </div>

            <div class="card">
                <div class="value">${sessions}</div>
                <div class="label">Sesiones</div>
            </div>

            <div class="card">
                <div class="value">${images}</div>
                <div class="label">Imágenes</div>
            </div>

            <div class="card">
                <div class="value">${hours}</div>
                <div class="label">Horas</div>
            </div>

        `;

    }
    catch(error){

        document.getElementById("stats").innerHTML = `
            <div style="padding:20px">
                Error loading data
            </div>
        `;

        console.error(error);

    }

}

loadStats();

</script>

</body>
</html>
